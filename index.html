<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bài tập</title>
</head>
<body>

<script>
let fullName = "Nguyen The Tu";
let studentId = "27A4042997";

let nameParts = fullName.toLowerCase().split(" ");

let lastName = nameParts[nameParts.length - 1];

let firstLetters = "";
for (let i = 0; i < nameParts.length - 1; i++) {
    firstLetters += nameParts[i][0];
}

let email = lastName + firstLetters + "." + studentId.toLowerCase() + "@hvnh.edu.vn";
let coursePeriod = studentId.substring(0, 2);

let faculty = studentId.substring(3,6);

switch (faculty) {
    case "404":
        faculty = "CNTT & KTS";
        break;
    case "401":
        faculty = "KHDL";
        break;
    case "401":
        faculty = "Ngân hàng";
        break;
    case "407":
        faculty = "Kinh tế";
        break;
    default:
        faculty = "Không xác định";
}
let sum = 0;
for (let i = studentId.length - 4; i < studentId.length; i++) {
    sum += parseInt(studentId[i]);
}

document.write("Email: " + email + "<br>");
document.write("Xin chào " + fullName + 
    ", bạn là sinh viên khóa " + coursePeriod + 
    ", khoa " + faculty + 
    ", tổng 4 số cuối là " + sum);

</script>

</body>
</html>
